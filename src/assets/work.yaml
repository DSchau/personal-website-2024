- title: Head of API Client
  location: San Francisco, CA
  employer: Postman
  logo: ./logos/postman.svg
  date: "2023-2026"
  description: I led the API Client team at Postman—one of the world's most loved developer tools, used by millions of developers daily. We owned the core request-sending engine across all protocols (REST, gRPC, WebSockets, GraphQL, MQTT, AI models, and MCP) and modernized the Postman platform for both humans and AI agents.
  highlights:
    - "**Modernized and innovated on the core API client.** Closed the top upvoted issues representing dozens of years of cumulative feature requests long demanded by users, making the core client simpler, faster, and more feature rich ([HTTP/2 support](https://github.com/postmanlabs/postman-app-support/issues/2701), [prompting for variables](https://github.com/postmanlabs/postman-app-support/issues/285), [SOCKS5 Proxy](https://github.com/postmanlabs/postman-app-support/issues/1321) and many more)"
    - "**Multi-protocol collection architecture.** Shipped a unified execution layer that standardized request sending across all protocols, accelerating new protocol development and expanding platform capabilities (collection runner, monitors, and mocks) to the full protocol suite"
    - "**Git-native filesystem.** Shipped a radically new Postman in a contained manner (git-native filesystem) that de-risked and validated next-generation product capabilities including first-class git integration, native filesystem support, and the v3 specification—the foundation for the next decade of API development by teams of both humans and AI agents"
    - "**New protocols and platform breadth.** Launched AI request and MCP request from zero to thousands of users, and shipped collection runner and CLI support for gRPC and GraphQL"
    - "**Built a top-tier global team.** Led, cultivated, and grew a first-class, product-minded engineering team with hubs in the SF Bay Area and Bangalore, India"
